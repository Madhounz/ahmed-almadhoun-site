backend:
  name: github
  repo: Madhounz/ahmed-almadhoun-site
  branch: main

media_folder: "photos"
public_folder: "/photos"

collections:

  - name: "photos"
    label: "Photography"
    label_singular: "Photo"
    folder: "_data/photos"
    create: true
    format: json
    extension: json
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Location", name: "location", widget: "string" }
      - { label: "Photo", name: "image", widget: "image" }
      - { label: "Aspect Ratio", name: "ratio", widget: "select", options: ["16/7", "4/3", "21/9", "3/4", "1/1", "16/9"], default: "4/3" }
      - { label: "Description", name: "description", widget: "text", required: false }

  - name: "research"
    label: "Research Papers"
    label_singular: "Paper"
    folder: "_data/research"
    create: true
    format: json
    extension: json
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Journal / Venue", name: "venue", widget: "string" }
      - { label: "DOI Link", name: "doi", widget: "string", required: false }
      - { label: "PDF File", name: "pdf", widget: "file", required: false }
      - { label: "Abstract", name: "abstract", widget: "text", required: false }
      - { label: "Tags", name: "tags", widget: "list", required: false }

  - name: "thoughts"
    label: "Thoughts & Posts"
    label_singular: "Post"
    folder: "_data/thoughts"
    create: true
    format: json
    extension: json
    slug: "{{year}}-{{month}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Category", name: "category", widget: "select", options: ["Research", "Photography", "Academia", "Personal", "Travel"] }
      - { label: "Excerpt", name: "excerpt", widget: "text" }
      - { label: "Full Content", name: "body", widget: "markdown" }
